# Development Profile Overrides
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
  
  application:
    name: backend-main
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${POSTGRES_DB:mystudyapp}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:changeme-strong-password-here}
    driver-class-name: org.postgresql.Driver
  
  # Gmail SMTP Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:ahmedmhiri2004@gmail.com}
    password: ${MAIL_PASSWORD:kobc yyrv nkdn ngtc}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# Logging
logging:
  level:
    # Fixed package name to match your actual code
    de.fhdortmund.mystudyapp: DEBUG
    
    # Optional: see SQL through the logger (nicer formatting than show-sql)
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    
    # Mail logging for debugging
    org.springframework.mail: DEBUG
    
    # Only enable if you are debugging security filters; otherwise it's noisy
    # org.springframework.security: DEBUG

# JWT
jwt:
  secret: ${JWT_SECRET:changeme-changeme-changeme-changeme-changeme-changeme-chang}
  access:
    expiration-ms: 900000
  refresh:
    expiration-ms: 604800000

# MQTT
mqtt:
  broker-url: tcp://${MQTT_HOST:localhost}:1883
  client-id: backend-main-subscriber
  default-topic: mystudyapp/events

# Application Storage Configuration
app:
  storage:
    avatar-location: uploads/avatars
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@mystudyapp.de}

server:
  port: ${SERVER_PORT:8081}